<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaira Chess Coach</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        /* ==================== TOP BAR ==================== */
        .top-bar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .close-btn {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: rgba(255,75,75,0.3);
            transform: rotate(90deg);
        }

        .points-display {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(88,204,2,0.2);
            padding: 10px 20px;
            border-radius: 25px;
            border: 2px solid #58cc02;
        }

        .points-icon {
            font-size: 1.8em;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .points-text {
            font-size: 1.3em;
            font-weight: 800;
            color: #58cc02;
        }

        .timer-display {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,193,7,0.2);
            padding: 10px 20px;
            border-radius: 25px;
            border: 2px solid #ffc107;
        }

        .timer-icon {
            font-size: 1.8em;
        }

        .timer-text {
            font-size: 1.3em;
            font-weight: 800;
            color: #ffc107;
            font-family: 'Courier New', monospace;
        }

        /* ==================== MAIN SECTION ==================== */
        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .game-title {
            text-align: center;
            font-size: 3em;
            font-weight: 900;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #58cc02, #46a302);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(88,204,2,0.3);
        }

        .game-area {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 1200px) {
            .game-area {
                grid-template-columns: 1fr;
            }
        }

        /* ==================== ZAIRA CHARACTER ==================== */
        .zaira-container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
            border: 2px solid rgba(88,204,2,0.2);
            position: sticky;
            top: 100px;
        }

        .zaira-character {
            position: relative;
            margin-bottom: 25px;
        }

        .zaira-avatar {
            width: 220px;
            height: 220px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 
                0 0 0 8px rgba(240,147,251,0.2),
                0 0 0 16px rgba(240,147,251,0.1),
                0 20px 60px rgba(240,147,251,0.4);
            animation: characterFloat 4s ease-in-out infinite;
            overflow: hidden;
        }

        @keyframes characterFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }

        .zaira-face {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Face features */
        .face-base {
            width: 140px;
            height: 160px;
            background: #FFE0BD;
            border-radius: 50% 50% 60% 60%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: inset 0 -20px 30px rgba(0,0,0,0.1);
        }

        .hair {
            width: 160px;
            height: 100px;
            background: #8B4513;
            border-radius: 50% 50% 0 0;
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .eyes {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 35px;
        }

        .eye {
            width: 28px;
            height: 28px;
            background: white;
            border-radius: 50%;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
            animation: blink 5s infinite;
        }

        @keyframes blink {
            0%, 90%, 100% { height: 28px; }
            95% { height: 3px; }
        }

        .pupil {
            width: 14px;
            height: 14px;
            background: #2c3e50;
            border-radius: 50%;
            position: absolute;
            top: 7px;
            left: 7px;
            animation: eyeMove 4s infinite;
        }

        @keyframes eyeMove {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(3px, -2px); }
            75% { transform: translate(-3px, 2px); }
        }

        .pupil::after {
            content: '';
            width: 5px;
            height: 5px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 3px;
            left: 3px;
        }

        .eyebrows {
            position: absolute;
            top: 38%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 35px;
        }

        .eyebrow {
            width: 25px;
            height: 4px;
            background: #6b3410;
            border-radius: 2px;
            animation: eyebrowMove 3s infinite;
        }

        @keyframes eyebrowMove {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-2px) rotate(-5deg); }
        }

        .nose {
            width: 8px;
            height: 12px;
            background: rgba(0,0,0,0.1);
            border-radius: 0 50% 50% 50%;
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translateX(-50%);
        }

        .mouth {
            width: 40px;
            height: 20px;
            border: 3px solid #ff6b9d;
            border-top: none;
            border-radius: 0 0 40px 40px;
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translateX(-50%);
            animation: smile 3s infinite;
        }

        @keyframes smile {
            0%, 100% { width: 40px; }
            50% { width: 50px; }
        }

        .blush {
            width: 20px;
            height: 15px;
            background: rgba(255,182,193,0.6);
            border-radius: 50%;
            position: absolute;
            top: 58%;
        }

        .blush.left { left: 15%; }
        .blush.right { right: 15%; }

        /* Zaira name and status */
        .zaira-name {
            text-align: center;
            font-size: 2em;
            font-weight: 900;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .zaira-status {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        /* Mood indicator */
        .mood-indicator {
            text-align: center;
            font-size: 3em;
            margin: 20px 0;
            animation: moodBounce 0.6s ease;
        }

        @keyframes moodBounce {
            0% { transform: scale(0.8) rotate(-10deg); }
            50% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* Speech bubble */
        .speech-bubble {
            background: linear-gradient(135deg, #58cc02, #46a302);
            padding: 25px;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 10px 30px rgba(88,204,2,0.3);
            animation: bubblePop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            margin-top: 20px;
        }

        @keyframes bubblePop {
            0% { transform: scale(0.5) translateY(30px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .speech-bubble::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 20px solid #58cc02;
        }

        .speech-text {
            color: white;
            font-size: 1.2em;
            line-height: 1.7;
            font-weight: 600;
            text-align: center;
        }

        /* Voice indicator */
        .voice-indicator {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }

        .voice-indicator.active {
            display: flex;
        }

        .voice-wave {
            width: 4px;
            height: 20px;
            background: #58cc02;
            border-radius: 2px;
            animation: voiceWave 0.8s ease-in-out infinite;
        }

        .voice-wave:nth-child(2) { animation-delay: 0.1s; }
        .voice-wave:nth-child(3) { animation-delay: 0.2s; }
        .voice-wave:nth-child(4) { animation-delay: 0.3s; }
        .voice-wave:nth-child(5) { animation-delay: 0.4s; }

        @keyframes voiceWave {
            0%, 100% { height: 20px; opacity: 0.3; }
            50% { height: 35px; opacity: 1; }
        }

        /* Thinking animation */
        .thinking-dots {
            display: none;
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            margin-top: 15px;
        }

        .thinking-dots.active {
            display: block;
        }

        .dots {
            font-size: 2.5em;
            animation: thinking 1.5s infinite;
        }

        @keyframes thinking {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* ==================== CHESS BOARD ==================== */
        .board-section {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
            border: 2px solid rgba(88,204,2,0.2);
        }

        .board-wrapper {
            max-width: 650px;
            margin: 0 auto;
        }

        .board-labels-top {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            padding: 0 12px;
        }

        .board-label {
            width: 12.5%;
            text-align: center;
            color: #58cc02;
            font-weight: 900;
            font-size: 1.3em;
            text-shadow: 0 0 10px rgba(88,204,2,0.5);
        }

        .board-container {
            display: flex;
            gap: 15px;
        }

        .board-labels-left {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 12px 0;
        }

        .chessboard {
            display: grid;
            grid-template-columns: repeat(8, 75px);
            grid-template-rows: repeat(8, 75px);
            border: 6px solid #58cc02;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 
                0 0 0 3px #1e293b,
                0 0 60px rgba(88,204,2,0.4),
                inset 0 0 20px rgba(0,0,0,0.3);
        }

        .square {
            width: 75px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
        }

        .square.light {
            background: linear-gradient(135deg, #475569, #64748b);
        }

        .square.dark {
            background: linear-gradient(135deg, #1e293b, #334155);
        }

        .square.selected {
            background: linear-gradient(135deg, #fbbf24, #f59e0b) !important;
            box-shadow: 
                inset 0 0 0 4px #58cc02,
                0 0 30px rgba(251,191,36,0.6);
            transform: scale(1.08);
        }

        .square.valid-move {
            background: linear-gradient(135deg, #10b981, #059669) !important;
            animation: validPulse 1.5s infinite;
        }

        @keyframes validPulse {
            0%, 100% { 
                box-shadow: 0 0 0 0 rgba(16,185,129,0.7);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 0 15px rgba(16,185,129,0);
                transform: scale(1.05);
            }
        }

        .square.valid-move::after {
            content: '✓';
            position: absolute;
            font-size: 0.4em;
            color: white;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            animation: checkPulse 1s infinite;
        }

        @keyframes checkPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .square:hover:not(.selected) {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .square {
            text-shadow: 
                -2px -2px 0 #000,
                2px -2px 0 #000,
                -2px 2px 0 #000,
                2px 2px 0 #000,
                0 0 15px rgba(0,0,0,0.8);
        }

        /* Move animations */
        .square.last-move {
            animation: lastMovePulse 1s ease-out;
        }

        @keyframes lastMovePulse {
            0% { box-shadow: 0 0 0 0 rgba(88,204,2,0.7); }
            100% { box-shadow: 0 0 0 20px rgba(88,204,2,0); }
        }

        /* Sound effect indicator */
        .sound-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8em;
            pointer-events: none;
            z-index: 1000;
            animation: soundPop 0.8s ease-out;
            display: none;
        }

        .sound-effect.active {
            display: block;
        }

        @keyframes soundPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.7; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        /* Progress feedback */
        .feedback {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #58cc02, #46a302);
            color: white;
            padding: 20px 30px;
            border-radius: 20px;
            font-size: 1.2em;
            font-weight: 800;
            box-shadow: 0 10px 40px rgba(88,204,2,0.4);
            animation: slideInRight 0.5s ease;
            display: none;
        }

        .feedback.active {
            display: block;
        }

        @keyframes slideInRight {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- TOP BAR -->
    <div class="top-bar">
        <button class="close-btn" onclick="closeApp()">✕</button>
        
        <div class="points-display">
            <div class="points-icon">⭐</div>
            <div class="points-text"><span id="points">0</span> POINTS</div>
        </div>

        <div class="timer-display">
            <div class="timer-icon">⏱️</div>
            <div class="timer-text" id="timer">20:00</div>
        </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="main-container">
        <h1 class="game-title">Play Chess</h1>

        <div class="game-area">
            <!-- ZAIRA CHARACTER -->
            <div class="zaira-container">
                <div class="zaira-character">
                    <div class="zaira-avatar">
                        <div class="zaira-face">
                            <div class="hair"></div>
                            <div class="face-base"></div>
                            <div class="eyebrows">
                                <div class="eyebrow"></div>
                                <div class="eyebrow"></div>
                            </div>
                            <div class="eyes">
                                <div class="eye">
                                    <div class="pupil"></div>
                                </div>
                                <div class="eye">
                                    <div class="pupil"></div>
                                </div>
                            </div>
                            <div class="nose"></div>
                            <div class="mouth"></div>
                            <div class="blush left"></div>
                            <div class="blush right"></div>
                        </div>
                    </div>

                    <div class="zaira-name">ZAIRA</div>
                    <div class="zaira-status">Your Chess Coach</div>

                    <div class="mood-indicator" id="moodIndicator">😊</div>

                    <div class="speech-bubble">
                        <div class="speech-text" id="speechText">
                            I'll go easy on you until I find your level.
                        </div>
                    </div>

                    <div class="voice-indicator" id="voiceIndicator">
                        <div class="voice-wave"></div>
                        <div class="voice-wave"></div>
                        <div class="voice-wave"></div>
                        <div class="voice-wave"></div>
                        <div class="voice-wave"></div>
                    </div>

                    <div class="thinking-dots" id="thinkingDots">
                        <div class="dots">🤔 💭 ⏳</div>
                        <div style="color: rgba(255,255,255,0.7); margin-top: 10px; font-weight: 600;">Thinking...</div>
                    </div>
                </div>
            </div>

            <!-- CHESS BOARD -->
            <div class="board-section">
                <div class="board-wrapper">
                    <div class="board-labels-top">
                        <div class="board-label">a</div>
                        <div class="board-label">b</div>
                        <div class="board-label">c</div>
                        <div class="board-label">d</div>
                        <div class="board-label">e</div>
                        <div class="board-label">f</div>
                        <div class="board-label">g</div>
                        <div class="board-label">h</div>
                    </div>
                    <div class="board-container">
                        <div class="board-labels-left">
                            <div class="board-label">8</div>
                            <div class="board-label">7</div>
                            <div class="board-label">6</div>
                            <div class="board-label">5</div>
                            <div class="board-label">4</div>
                            <div class="board-label">3</div>
                            <div class="board-label">2</div>
                            <div class="board-label">1</div>
                        </div>
                        <div class="chessboard" id="chessboard"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sound effect indicator -->
    <div class="sound-effect" id="soundEffect"></div>

    <!-- Feedback -->
    <div class="feedback" id="feedback"></div>

    <script>
        // Chess pieces
        const pieces = {
            'K': '♔', 'Q': '♕', 'R': '♖', 'B': '♗', 'N': '♘', 'P': '♙',
            'k': '♚', 'q': '♛', 'r': '♜', 'b': '♝', 'n': '♞', 'p': '♟'
        };

        // Game state
        let board = [];
        let selectedSquare = null;
        let currentTurn = 'white';
        let points = 0;
        let timeLeft = 1200; // 20 minutes
        let gameActive = true;

        // Zaira's voice lines
        const zairaLines = {
            greeting: ["I'll go easy on you until I find your level.", "Let's play! I'm excited! 😊", "Ready to learn? Let's go!"],
            goodMove: ["Nice move! You're learning fast! 🌟", "Great thinking! 💡", "You're getting stronger 💪", "Impressive! Keep it up! ✨"],
            badMove: ["Oops! That piece was hanging. 😅", "Hmm... try thinking about your king's safety.", "That was risky! Be careful! ⚠️"],
            thinking: ["Let me think... 🤔", "Hmm... what should I do? 💭", "Interesting position..."],
            capture: ["Oh no! You got me! 😲", "Nice capture! 👏", "You're playing well! 🎯"],
            check: ["Check! Watch your king! 👑", "Your king is in danger! ⚠️"],
            encouragement: ["Don't give up! You can do it! 💪", "Keep trying! You're improving! 🌟", "Think before you move... 🧠"]
        };

        // Initialize board
        function initBoard() {
            board = [
                ['r','n','b','q','k','b','n','r'],
                ['p','p','p','p','p','p','p','p'],
                ['','','','','','','',''],
                ['','','','','','','',''],
                ['','','','','','','',''],
                ['','','','','','','',''],
                ['P','P','P','P','P','P','P','P'],
                ['R','N','B','Q','K','B','N','R']
            ];
            renderBoard();
            speak(randomLine(zairaLines.greeting));
        }

        // Render board
        function renderBoard() {
            const boardElement = document.getElementById('chessboard');
            boardElement.innerHTML = '';

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');
                    square.className = 'square ' + ((row + col) % 2 === 0 ? 'light' : 'dark');
                    square.dataset.row = row;
                    square.dataset.col = col;
                    square.onclick = () => handleSquareClick(row, col);
                    
                    const piece = board[row][col];
                    if (piece) {
                        square.textContent = pieces[piece];
                        square.style.color = piece === piece.toUpperCase() ? '#ffffff' : '#1a1a1a';
                    }
                    
                    boardElement.appendChild(square);
                }
            }
        }

        // Handle square click
        function handleSquareClick(row, col) {
            if (!gameActive || currentTurn !== 'white') return;

            if (selectedSquare) {
                const [fromRow, fromCol] = selectedSquare;
                if (isValidMove(fromRow, fromCol, row, col)) {
                    makeMove(fromRow, fromCol, row, col);
                    playSound('move');
                } else {
                    selectedSquare = null;
                    renderBoard();
                }
            } else {
                const piece = board[row][col];
                if (piece && piece === piece.toUpperCase()) {
                    selectedSquare = [row, col];
                    highlightSquare(row, col, 'selected');
                    showValidMoves(row, col);
                }
            }
        }

        // Check valid move (simplified)
        function isValidMove(fromRow, fromCol, toRow, toCol) {
            const piece = board[fromRow][fromCol];
            const target = board[toRow][toCol];
            
            if (target && target === target.toUpperCase()) return false;
            if (fromRow === toRow && fromCol === toCol) return false;

            // Basic movement rules
            const pieceType = piece.toLowerCase();
            const rowDiff = Math.abs(toRow - fromRow);
            const colDiff = Math.abs(toCol - fromCol);

            switch(pieceType) {
                case 'p':
                    const direction = -1;
                    if (fromCol === toCol && !target) {
                        if (toRow === fromRow + direction) return true;
                        if (fromRow === 6 && toRow === fromRow + 2 * direction) return true;
                    }
                    if (Math.abs(toCol - fromCol) === 1 && toRow === fromRow + direction && target) return true;
                    return false;
                case 'r':
                    return fromRow === toRow || fromCol === toCol;
                case 'n':
                    return (rowDiff === 2 && colDiff === 1) || (rowDiff === 1 && colDiff === 2);
                case 'b':
                    return rowDiff === colDiff;
                case 'q':
                    return fromRow === toRow || fromCol === toCol || rowDiff === colDiff;
                case 'k':
                    return rowDiff <= 1 && colDiff <= 1;
            }
            return false;
        }

        // Make move
        function makeMove(fromRow, fromCol, toRow, toCol) {
            const piece = board[fromRow][fromCol];
            const captured = board[toRow][toCol];

            board[toRow][toCol] = piece;
            board[fromRow][fromCol] = '';
            selectedSquare = null;
            renderBoard();

            if (captured) {
                addPoints(10);
                speak(randomLine(zairaLines.capture));
                showFeedback('+10 points! Nice capture! 🎯');
                playSound('capture');
            } else {
                addPoints(5);
                speak(randomLine(zairaLines.goodMove));
                playSound('move');
            }

            currentTurn = 'black';
            setTimeout(makeAIMove, 1500);
        }

        // AI move
        function makeAIMove() {
            updateMood('🤔');
            document.getElementById('thinkingDots').classList.add('active');
            speak(randomLine(zairaLines.thinking));

            setTimeout(() => {
                document.getElementById('thinkingDots').classList.remove('active');
                
                // Simple random AI
                const moves = [];
                for (let fromRow = 0; fromRow < 8; fromRow++) {
                    for (let fromCol = 0; fromCol < 8; fromCol++) {
                        const piece = board[fromRow][fromCol];
                        if (piece && piece === piece.toLowerCase()) {
                            for (let toRow = 0; toRow < 8; toRow++) {
                                for (let toCol = 0; toCol < 8; toCol++) {
                                    if (isValidMove(fromRow, fromCol, toRow, toCol)) {
                                        moves.push({ from: [fromRow, fromCol], to: [toRow, toCol] });
                                    }
                                }
                            }
                        }
                    }
                }

                if (moves.length > 0) {
                    const move = moves[Math.floor(Math.random() * moves.length)];
                    const captured = board[move.to[0]][move.to[1]];
                    
                    board[move.to[0]][move.to[1]] = board[move.from[0]][move.from[1]];
                    board[move.from[0]][move.from[1]] = '';
                    renderBoard();

                    if (captured) {
                        updateMood('😊');
                        playSound('capture');
                    } else {
                        updateMood('😊');
                        speak(randomLine(zairaLines.encouragement));
                        playSound('move');
                    }
                }

                currentTurn = 'white';
            }, 2000);
        }

        // Highlight square
        function highlightSquare(row, col, className) {
            const squares = document.querySelectorAll('.square');
            squares.forEach(sq => {
                if (parseInt(sq.dataset.row) === row && parseInt(sq.dataset.col) === col) {
                    sq.classList.add(className);
                }
            });
        }

        // Show valid moves
        function showValidMoves(row, col) {
            for (let toRow = 0; toRow < 8; toRow++) {
                for (let toCol = 0; toCol < 8; toCol++) {
                    if (isValidMove(row, col, toRow, toCol)) {
                        highlightSquare(toRow, toCol, 'valid-move');
                    }
                }
            }
        }

        // Update Zaira's mood
        function updateMood(emoji) {
            const mood = document.getElementById('moodIndicator');
            mood.textContent = emoji;
            mood.style.animation = 'none';
            setTimeout(() => mood.style.animation = 'moodBounce 0.6s ease', 10);
        }

        // Speak (simulated)
        function speak(text) {
            document.getElementById('speechText').textContent = text;
            
            // Simulate voice with indicator
            const voiceIndicator = document.getElementById('voiceIndicator');
            voiceIndicator.classList.add('active');
            
            setTimeout(() => {
                voiceIndicator.classList.remove('active');
            }, 2000);

            // Text-to-speech (if supported)
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9;
                utterance.pitch = 1.2;
                utterance.volume = 0.8;
                speechSynthesis.speak(utterance);
            }
        }

        // Random line
        function randomLine(lines) {
            return lines[Math.floor(Math.random() * lines.length)];
        }

        // Add points
        function addPoints(pts) {
            points += pts;
            document.getElementById('points').textContent = points;
        }

        // Show feedback
        function showFeedback(text) {
            const feedback = document.getElementById('feedback');
            feedback.textContent = text;
            feedback.classList.add('active');
            setTimeout(() => feedback.classList.remove('active'), 3000);
        }

        // Play sound
        function playSound(type) {
            const soundEffect = document.getElementById('soundEffect');
            soundEffect.textContent = type === 'capture' ? '💥' : '✨';
            soundEffect.classList.add('active');
            setTimeout(() => soundEffect.classList.remove('active'), 800);

            // Haptic feedback (mobile)
            if ('vibrate' in navigator) {
                navigator.vibrate(type === 'capture' ? [50, 100, 50] : [30]);
            }
        }

        // Timer
        function startTimer() {
            setInterval(() => {
                if (!gameActive) return;
                
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                document.getElementById('timer').textContent = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

                if (timeLeft <= 0) {
                    gameActive = false;
                    speak("Time's up! Great game! 🎉");
                    updateMood('😊');
                }
            }, 1000);
        }

        // Close app
        function closeApp() {
            if (confirm('Are you sure you want to quit?')) {
                speak("Thanks for playing! See you next time! 👋");
                setTimeout(() => window.close(), 2000);
            }
        }

        // Initialize game
        initBoard();
        startTimer();
    </script>
</body>
</html>
